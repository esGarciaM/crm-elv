services:
  backend:
    build: ./backend
    volumes:
      - backend_uploads:/app/uploads
      - backend_db:/app/data
    environment:
      - PORT=3001
      - DB_PATH=/app/data/crm.db
    restart: unless-stopped
    expose:
      - 3001

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - 80:80
    depends_on:
      - backend
    restart: unless-stopped
    expose:
      - 80

volumes:
  backend_uploads:
  backend_db:
